name: Smart Waste Classifier CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pillow numpy

      - name: Check API file exists
        run: |
          test -f api.py && echo "api.py exists ✅"

      - name: Check app file exists
        run: |
          test -f app.py && echo "app.py exists ✅"